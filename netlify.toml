[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Aumenta timeout per la funzione Next.js (PDF parsing + embedding OpenAI)
[functions."___netlify-server-handler"]
  timeout = 60
